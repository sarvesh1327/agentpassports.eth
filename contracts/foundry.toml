[profile.default]
# Keep the Solidity project conventional so specs and future scripts can refer to stable paths.
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# Pin the compiler for reproducible EIP-712 and reimbursement tests.
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

[fmt]
# Match the line width used in the contract specs.
line_length = 100
tab_width = 4
bracket_spacing = true
